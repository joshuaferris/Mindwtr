name: Release macOS

on:
  workflow_call:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.3)'
        required: false
        type: string
    secrets:
      APPLE_ID:
        required: false
      APPLE_PASSWORD:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPLE_CERTIFICATE:
        required: false
      APPLE_CERTIFICATE_PASSWORD:
        required: false
      APPLE_SIGNING_IDENTITY:
        required: false
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.3)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust_target: aarch64-apple-darwin
            artifact_name: release-macos-arm64
          - platform: macos-15
            rust_target: x86_64-apple-darwin
            artifact_name: release-macos-x64
    runs-on: ${{ matrix.platform }}
    name: macOS Build (${{ matrix.rust_target }})
    timeout-minutes: 90
    env:
      VITE_DROPBOX_APP_KEY: ${{ vars.VITE_DROPBOX_APP_KEY || secrets.VITE_DROPBOX_APP_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Ensure macOS SetFile is on PATH
        run: |
          if [ -z "$DEVELOPER_DIR" ]; then
            DEVELOPER_DIR="$(xcode-select -p)"
            echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          fi
          export DEVELOPER_DIR
          SETFILE_PATH="$(xcrun --find SetFile || true)"
          if [ -n "$SETFILE_PATH" ]; then
            echo "$(dirname "$SETFILE_PATH")" >> "$GITHUB_PATH"
          fi
          which SetFile || true

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0"

      - name: Setup Bun
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.x"

      - name: Install dependencies
        run: bun install

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE:-}" ]; then
            echo "::warning::APPLE_CERTIFICATE secret not set; skipping explicit keychain import."
            if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
              echo "APPLE_SIGNING_IDENTITY=${APPLE_SIGNING_IDENTITY}" >> "$GITHUB_ENV"
            fi
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/mindwtr-dev-id.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/mindwtr-dev-id.p12"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
          if [ -f "$LOGIN_KEYCHAIN" ]; then
            security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN" "/Library/Keychains/System.keychain"
          else
            security list-keychains -d user -s "$KEYCHAIN_PATH" "/Library/Keychains/System.keychain"
          fi
          security default-keychain -s "$KEYCHAIN_PATH"

          if ! printf '%s' "$APPLE_CERTIFICATE" | tr -d '\r' | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$APPLE_CERTIFICATE" | tr -d '\r' | base64 -D > "$CERT_PATH"
          fi

          if ! openssl pkcs12 -in "$CERT_PATH" -passin "pass:${APPLE_CERTIFICATE_PASSWORD:-}" -nokeys -clcerts >/dev/null 2>&1; then
            echo "::error::Unable to open APPLE_CERTIFICATE with the provided APPLE_CERTIFICATE_PASSWORD."
            exit 1
          fi

          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${APPLE_CERTIFICATE_PASSWORD:-}" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign:,security: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          RESOLVED_IDENTITY="${APPLE_SIGNING_IDENTITY:-}"
          if [ -z "${RESOLVED_IDENTITY}" ] || [ "${RESOLVED_IDENTITY}" = "Developer ID Application" ]; then
            RESOLVED_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)"
          fi

          if [ -z "${RESOLVED_IDENTITY}" ]; then
            echo "::error::Failed to resolve a Developer ID Application identity from the imported certificate."
            exit 1
          fi

          echo "Resolved macOS signing identity: ${RESOLVED_IDENTITY}"
          echo "APPLE_SIGNING_IDENTITY=${RESOLVED_IDENTITY}" >> "$GITHUB_ENV"

      - name: Prepare macOS release Tauri config
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("apps/desktop/src-tauri/tauri.conf.json")
          config = json.loads(path.read_text(encoding="utf-8"))
          mac = config.setdefault("bundle", {}).setdefault("macOS", {})
          files = mac.get("files")
          if isinstance(files, dict):
            files.pop("Info.plist", None)
            if files:
              mac["files"] = files
            else:
              mac.pop("files", None)
          mac["infoPlist"] = "./Info.plist"
          path.write_text(json.dumps(config, indent=2) + "\n", encoding="utf-8")
          print("Prepared tauri.conf.json for notarized macOS build")
          PY
          grep -n '"infoPlist"\|"files"' apps/desktop/src-tauri/tauri.conf.json || true
        shell: bash

      - name: Build App
        timeout-minutes: 40
        run: |
          set -euo pipefail
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -n "${KEYCHAIN_PASSWORD:-}" ]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            LOGIN_KEYCHAIN="$HOME/Library/Keychains/login.keychain-db"
            if [ -f "$LOGIN_KEYCHAIN" ]; then
              security list-keychains -d user -s "$KEYCHAIN_PATH" "$LOGIN_KEYCHAIN" "/Library/Keychains/System.keychain"
            else
              security list-keychains -d user -s "$KEYCHAIN_PATH" "/Library/Keychains/System.keychain"
            fi
            security default-keychain -s "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple:,codesign:,security: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          fi
          cd apps/desktop

          cleanup_dmg_mounts() {
            # Detach stale Mindwtr DMG mounts that can make hdiutil report "Resource busy".
            local devices
            devices="$(hdiutil info | awk '
              /^\/dev\// { dev=$1 }
              /\/Volumes\/Mindwtr/ { if (dev != "") print dev }
            ' | sort -u)"
            if [ -n "${devices}" ]; then
              while IFS= read -r dev; do
                [ -n "${dev}" ] || continue
                hdiutil detach "${dev}" -force || true
              done <<< "${devices}"
            fi
          }

          for attempt in 1 2 3; do
            log_file="${RUNNER_TEMP}/tauri-macos-build-${{ matrix.rust_target }}-${attempt}.log"
            echo "Running macOS bundle build (attempt ${attempt}/3)..."
            if cargo tauri build --target ${{ matrix.rust_target }} 2>&1 | tee "${log_file}"; then
              exit 0
            fi

            if grep -q "hdiutil: create failed - Resource busy" "${log_file}"; then
              echo "Detected transient hdiutil resource-busy failure. Cleaning stale mounts and retrying..."
              cleanup_dmg_mounts
              sleep $((attempt * 5))
              continue
            fi

            echo "Non-retryable macOS build failure."
            exit 1
          done

          echo "::error::macOS bundle build failed after retries."
          exit 1
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_ANALYTICS_HEARTBEAT_URL: ${{ secrets.ANALYTICS_HEARTBEAT_URL }}
          TAURI_LOG_LEVEL: "debug"
          RUST_LOG: "tauri=debug,tauri_bundler=debug,tauri_cli=debug"
          MACOSX_DEPLOYMENT_TARGET: "10.15"
          CMAKE_OSX_DEPLOYMENT_TARGET: "10.15"
          DEVELOPER_DIR: ${{ env.DEVELOPER_DIR }}

      - name: Verify macOS app signature
        run: |
          set -euo pipefail
          APP_DIR="apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos"
          APP_PATH="$(find "$APP_DIR" -maxdepth 1 -name '*.app' | head -n 1)"
          if [ -z "${APP_PATH:-}" ]; then
            echo "::error::Built .app bundle not found in $APP_DIR"
            exit 1
          fi
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          codesign -dvv "$APP_PATH/Contents/MacOS/mindwtr"
        shell: bash

      - name: Notarize DMG
        timeout-minutes: 25
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
            echo "Notarization secrets not set; skipping."
            exit 0
          fi
          set -euo pipefail
          DMG_DIR="apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg"
          if [ ! -d "$DMG_DIR" ]; then
            echo "No dmg directory found at $DMG_DIR"
            exit 1
          fi
          found=0
          for dmg in "$DMG_DIR"/*.dmg; do
            if [ ! -f "$dmg" ]; then
              continue
            fi
            found=1
            echo "Submitting $dmg for notarization"
            submit_output="${RUNNER_TEMP}/$(basename "$dmg").notary.json"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --output-format json | tee "$submit_output"

            submission_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("id", ""))' "$submit_output")"
            submission_status="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("status", ""))' "$submit_output")"

            if [ "$submission_status" != "Accepted" ]; then
              echo "::error::Notarization failed for $dmg with status: ${submission_status:-unknown}"
              if [ -n "$submission_id" ]; then
                log_output="${RUNNER_TEMP}/$(basename "$dmg").notary-log.json"
                xcrun notarytool log "$submission_id" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_PASSWORD" \
                  --team-id "$APPLE_TEAM_ID" \
                  "$log_output" || true
                if [ -f "$log_output" ]; then
                  echo "Apple notary log for $dmg:"
                  cat "$log_output"
                fi
              fi
              exit 1
            fi

            echo "Stapling $dmg"
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done
          if [ "$found" -eq 0 ]; then
            echo "No dmg files found in $DMG_DIR"
            exit 1
          fi
        shell: bash

      - name: Collect macOS artifacts
        run: |
          mkdir -p release-artifacts
          for f in $(find apps/desktop/src-tauri/target/${{ matrix.rust_target }}/release/bundle -name "*.dmg" -o -name "*.app.tar.gz"); do
            base=$(basename "$f")
            lower=$(echo "$base" | tr 'A-Z' 'a-z')
            cp "$f" "release-artifacts/$lower"
          done
          ls -la release-artifacts/ || true
        shell: bash

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-artifacts/*
          if-no-files-found: warn
          retention-days: 28
