name: Update Linux Repos
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.6.3)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.6.3)"
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-repo-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-repo:
    runs-on: ubuntu-22.04
    timeout-minutes: 45
    steps:
      - name: Checkout Code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Set release tag (release event)
        if: github.event_name == 'release'
        run: echo "RELEASE_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Set release tag (manual)
        if: github.event_name == 'workflow_dispatch'
        run: echo "RELEASE_TAG=${{ inputs.tag }}" >> $GITHUB_ENV
      
      - name: Set release tag (workflow call)
        if: github.event_name == 'workflow_call'
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Set release tag (push)
        if: github.event_name == 'push'
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "RELEASE_TAG=$TAG" >> "$GITHUB_ENV"

      - name: Download Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          MAX_RETRIES=5
          for attempt in $(seq 1 "${MAX_RETRIES}"); do
            echo "Downloading release assets for ${TAG} (attempt ${attempt}/${MAX_RETRIES})"
            if gh release download "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "*" \
              --clobber; then
              echo "Release assets downloaded successfully."
              break
            fi
            if [ "${attempt}" -eq "${MAX_RETRIES}" ]; then
              echo "Failed to download release assets after ${MAX_RETRIES} attempts." >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Prepare Repo Directories
        run: |
          set -euo pipefail
          mkdir -p build_repo/deb build_repo/rpm
          shopt -s nullglob
          debs=( *.deb )
          rpms=( *.rpm )
          if (( ${#debs[@]} > 0 )); then mv -- "${debs[@]}" build_repo/deb/; fi
          if (( ${#rpms[@]} > 0 )); then mv -- "${rpms[@]}" build_repo/rpm/; fi
          gpg --armor --export > build_repo/mindwtr.gpg.key

      - name: Build DEB Repo
        working-directory: build_repo/deb
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils
          apt-ftparchive packages . > Packages
          apt-ftparchive release . > Release
          gpg --batch --yes --clearsign -o InRelease Release
          gpg --batch --yes -abs -o Release.gpg Release

      - name: Build RPM Repo
        working-directory: build_repo/rpm
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c
          createrepo_c .
          if [ -f repodata/repomd.xml ]; then
            gpg --batch --yes --armor --detach-sign -o repodata/repomd.xml.asc repodata/repomd.xml
          else
            echo "repodata/repomd.xml not found after createrepo_c" >&2
            exit 1
          fi

      - name: Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          pages_dir="$(mktemp -d)"

          cleanup() {
            git worktree remove --force "$pages_dir" >/dev/null 2>&1 || true
            rm -rf "$pages_dir"
          }

          trap cleanup EXIT

          git fetch origin gh-pages:refs/remotes/origin/gh-pages >/dev/null 2>&1 || true

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add --track -B gh-pages "$pages_dir" origin/gh-pages
          else
            git worktree add --detach "$pages_dir"
            git -C "$pages_dir" checkout --orphan gh-pages
            find "$pages_dir" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          rsync -a ./build_repo/ "$pages_dir"/
          touch "$pages_dir/.nojekyll"

          git -C "$pages_dir" config user.name "GitHub Actions"
          git -C "$pages_dir" config user.email "actions@github.com"
          git -C "$pages_dir" add -A

          if git -C "$pages_dir" diff --cached --quiet; then
            echo "No gh-pages changes to publish."
            exit 0
          fi

          git -C "$pages_dir" commit -m "Publish Linux repos for ${RELEASE_TAG:-${GITHUB_REF_NAME}}"
          git -C "$pages_dir" push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
